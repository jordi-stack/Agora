  <link rel="icon" type="image/png" href="/logo.png" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      background: #0a0a0f;
      color: #e0e0e0;
      line-height: 1.5;
    }

      width: 6px;
