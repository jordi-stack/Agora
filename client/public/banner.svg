<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#111118"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="50%" style="stop-color:#00ccff"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00cc66"/>
    </linearGradient>
  </defs>

  <rect width="800" height="140" rx="8" fill="url(#bg)"/>
  <rect x="0" y="136" width="800" height="4" rx="0" fill="url(#glow)" opacity="0.6"/>

  <!-- Lightning bolt -->
  <g transform="translate(40, 28)">
    <polygon points="30,0 12,38 24,38 10,84 50,32 36,32 50,0" fill="url(#accent)" opacity="0.9"/>
  </g>

  <!-- AGORA text -->
  <text x="110" y="82" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="56" font-weight="bold" fill="url(#accent)" letter-spacing="8">AGORA</text>

  <!-- Subtitle -->
  <text x="110" y="112" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="14" fill="#555" letter-spacing="2">Self-Sustaining AI Agent</text>

  <!-- Badges -->
  <rect x="520" y="40" width="60" height="22" rx="4" fill="#00ff8822"/>
  <text x="550" y="55" font-family="'SF Mono',monospace" font-size="10" fill="#00ff88" text-anchor="middle" font-weight="bold">x402</text>

  <rect x="588" y="40" width="55" height="22" rx="4" fill="#00ccff22"/>
  <text x="615" y="55" font-family="'SF Mono',monospace" font-size="10" fill="#00ccff" text-anchor="middle" font-weight="bold">WDK</text>

  <rect x="651" y="40" width="65" height="22" rx="4" fill="#00ccff22"/>
  <text x="683" y="55" font-family="'SF Mono',monospace" font-size="10" fill="#00ccff" text-anchor="middle" font-weight="bold">Plasma</text>

  <rect x="724" y="40" width="56" height="22" rx="4" fill="#ff664422"/>
  <text x="752" y="55" font-family="'SF Mono',monospace" font-size="10" fill="#ff6644" text-anchor="middle" font-weight="bold">USDT0</text>

  <!-- Tagline right side -->
  <text x="520" y="82" font-family="'SF Mono',monospace" font-size="11" fill="#888">Earns USDT0 via x402 micropayments</text>
  <text x="520" y="100" font-family="'SF Mono',monospace" font-size="11" fill="#888">Manages treasury via Tether WDK</text>
  <text x="520" y="118" font-family="'SF Mono',monospace" font-size="11" fill="#555">on Plasma blockchain</text>
</svg>
